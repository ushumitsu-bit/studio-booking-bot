<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Студия пилатеса</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --bg:      #0B0B14;
  --bg2:     #13131F;
  --card:    rgba(255,255,255,0.045);
  --border:  rgba(255,255,255,0.07);
  --gold:    #C9A84C;
  --gold-lt: #E4C97A;
  --lilac:   #9D87C2;
  --text:    #EDE9E2;
  --muted:   rgba(237,233,226,0.45);
  --green:   #5BAF7A;
  --red:     #D96060;
  --amber:   #D4973A;
  --nav:     70px;
  --sab:     env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);overscroll-behavior:none}

/* ── Ambient glow ── */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 70% 45% at 15% 0%,   rgba(157,135,194,.14) 0%,transparent 65%),
    radial-gradient(ellipse 55% 40% at 90% 105%,  rgba(201,168,76,.10)  0%,transparent 60%);
}

/* ── Layout ── */
#app{position:fixed;inset:0;display:flex;flex-direction:column}
.screen{
  display:none;flex:1;overflow-y:auto;
  padding:20px 16px calc(var(--nav) + var(--sab) + 20px);
  position:relative;z-index:1;
  -webkit-overflow-scrolling:touch;
}
.screen.active{display:block}

/* ── Bottom nav ── */
nav{
  position:fixed;bottom:0;left:0;right:0;
  height:calc(var(--nav) + var(--sab));
  padding-bottom:var(--sab);
  background:rgba(11,11,20,.88);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid var(--border);
  display:flex;z-index:100;
}
.ni{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:4px;cursor:pointer;
  color:var(--muted);transition:color .2s;
}
.ni.on{color:var(--gold)}
.ni svg{width:22px;height:22px;transition:transform .2s}
.ni.on svg{transform:translateY(-2px)}
.ni span{font-size:10px;font-weight:500;letter-spacing:.3px}

/* ── Cards ── */
.card{
  background:var(--card);border:1px solid var(--border);
  border-radius:18px;padding:16px;margin-bottom:12px;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}

/* ── HOME ── */
.hero{
  position:relative;overflow:hidden;
  background:linear-gradient(135deg,rgba(157,135,194,.18) 0%,rgba(201,168,76,.12) 100%);
  border:1px solid rgba(201,168,76,.18);
  border-radius:22px;padding:22px 20px 20px;
  margin-bottom:14px;
}
.hero-dancer{
  position:absolute;right:-8px;top:-4px;width:110px;height:110px;
  opacity:.13;pointer-events:none;
}
.hero-sub{font-size:12px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}
.hero-name{font-size:24px;font-weight:800;letter-spacing:-.5px}
.hero-name em{color:var(--gold);font-style:normal}
.hero-row{display:flex;gap:16px;margin-top:14px}
.hero-stat{flex:1}
.hero-val{font-size:30px;font-weight:900;color:var(--gold-lt);line-height:1}
.hero-lbl{font-size:11px;color:var(--muted);margin-top:2px}

.sec{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:18px 0 10px}

/* ── Class card ── */
.cc{
  display:flex;align-items:center;gap:12px;
  padding:13px 14px;
  background:var(--card);border:1px solid var(--border);border-radius:15px;
  margin-bottom:8px;cursor:pointer;transition:transform .15s,opacity .15s;
}
.cc:active{transform:scale(.98);opacity:.8}
.cc.booked{border-color:rgba(91,175,122,.28);background:rgba(91,175,122,.06)}
.cc-time{font-size:21px;font-weight:900;color:var(--gold);min-width:52px;line-height:1}
.cc-info{flex:1;min-width:0}
.cc-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cc-meta{font-size:12px;color:var(--muted);margin-top:3px}
.badge{font-size:11px;font-weight:600;padding:4px 9px;border-radius:20px;flex-shrink:0;white-space:nowrap}
.badge-ok  {background:rgba(91,175,122,.14);color:#5BAF7A;border:1px solid rgba(91,175,122,.22)}
.badge-few {background:rgba(212,151,58,.14); color:var(--amber);border:1px solid rgba(212,151,58,.22)}
.badge-no  {background:rgba(217,96,96,.1);   color:var(--red);  border:1px solid rgba(217,96,96,.2)}
.badge-yes {background:rgba(91,175,122,.14); color:#5BAF7A;     border:1px solid rgba(91,175,122,.22)}

/* ── CALENDAR ── */
.cal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.cal-title{font-size:20px;font-weight:800}
.cal-btns{display:flex;gap:8px}
.cal-btn{
  width:36px;height:36px;border-radius:50%;
  background:var(--card);border:1px solid var(--border);
  color:var(--text);display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:16px;transition:all .15s;user-select:none;
  touch-action:manipulation;
}
.cal-btn:active{background:var(--border);transform:scale(.9)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:18px}
.cal-dn{text-align:center;font-size:11px;color:var(--muted);padding:5px 0;font-weight:600}
.cal-d{
  aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  border-radius:50%;font-size:13px;cursor:pointer;
  transition:all .15s;position:relative;font-weight:500;
}
.cal-d.empty,.cal-d.past{cursor:default}
.cal-d.past{color:rgba(237,233,226,.18)}
.cal-d.today{background:rgba(201,168,76,.18);color:var(--gold);font-weight:700}
.cal-d.sel{background:var(--gold);color:#0B0B14;font-weight:800}
.cal-d.dot::after{
  content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);
  width:4px;height:4px;border-radius:50%;background:var(--gold);
}
.cal-d.sel::after{background:#0B0B14}
.cal-d:not(.past):not(.empty):active{opacity:.65;transform:scale(.88)}

.day-hd{font-size:15px;font-weight:600;color:var(--muted);margin:0 0 12px}
.day-hd b{color:var(--text)}

/* ── BOOKINGS ── */
.bk-hd{padding-top:4px;margin-bottom:20px}
.bk-hd h2{font-size:22px;font-weight:800}
.bk-hd p{font-size:13px;color:var(--muted);margin-top:3px}
.bk-item{
  display:flex;gap:14px;padding:14px;
  background:var(--card);border:1px solid var(--border);border-radius:15px;margin-bottom:8px;
}
.bk-date{min-width:42px;text-align:center;padding-top:2px}
.bk-day{font-size:24px;font-weight:900;color:var(--gold);line-height:1}
.bk-mon{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:1px}
.bk-info{flex:1}
.bk-ttl{font-size:14px;font-weight:600}
.bk-sub{font-size:12px;color:var(--muted);margin-top:2px}
.bk-time{font-size:12px;font-weight:600;background:rgba(201,168,76,.1);color:var(--gold);padding:3px 8px;border-radius:6px;display:inline-block;margin-top:6px}
.del-btn{align-self:center;background:none;border:none;color:var(--muted);cursor:pointer;padding:6px;border-radius:8px;flex-shrink:0;transition:color .2s}
.del-btn:active{color:var(--red)}

/* ── SUB ── */
.sub-hd{padding-top:4px;margin-bottom:20px}
.sub-hd h2{font-size:22px;font-weight:800}
.sub-hd p{font-size:13px;color:var(--muted);margin-top:3px}
.sub-hero{
  position:relative;overflow:hidden;
  background:linear-gradient(135deg,rgba(157,135,194,.16) 0%,rgba(201,168,76,.12) 100%);
  border:1px solid rgba(201,168,76,.2);border-radius:20px;
  padding:26px 22px 22px;margin-bottom:14px;text-align:center;
}
.sub-hero::before{
  content:'';position:absolute;right:-30px;bottom:-30px;
  width:140px;height:140px;border-radius:50%;
  background:radial-gradient(circle,rgba(201,168,76,.1) 0%,transparent 70%);
  pointer-events:none;
}
.sub-big{font-size:64px;font-weight:900;color:var(--gold-lt);line-height:1;margin-bottom:4px}
.sub-lbl{font-size:13px;color:var(--muted);margin-bottom:18px}
.prog-wrap{background:rgba(255,255,255,.07);border-radius:100px;height:7px;overflow:hidden;margin-bottom:6px}
.prog-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--lilac),var(--gold));transition:width .6s cubic-bezier(.4,0,.2,1)}
.prog-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--muted)}
.plan{
  display:flex;align-items:center;justify-content:space-between;
  padding:15px 16px;background:var(--card);border:1px solid var(--border);
  border-radius:15px;margin-bottom:9px;cursor:pointer;transition:all .2s;
}
.plan:active{transform:scale(.98)}
.plan.feat{border-color:rgba(201,168,76,.35);background:rgba(201,168,76,.07)}
.plan-l .plan-n{font-size:15px;font-weight:600}
.plan-l .plan-d{font-size:12px;color:var(--muted);margin-top:2px}
.plan-p{font-size:19px;font-weight:800;color:var(--gold)}
.hot{font-size:10px;font-weight:700;background:var(--gold);color:#0B0B14;padding:2px 7px;border-radius:20px;margin-left:7px;vertical-align:middle}

/* ── SHEET ── */
.overlay{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.65);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  align-items:flex-end;
}
.overlay.open{display:flex}
.sheet{
  background:#14141F;border:1px solid var(--border);
  border-radius:26px 26px 0 0;
  padding:20px 20px calc(20px + var(--sab));
  width:100%;max-height:85vh;overflow-y:auto;
  animation:up .3s cubic-bezier(.4,0,.2,1);
}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sh-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px}
.sh-title{font-size:20px;font-weight:800;margin-bottom:6px}
.sh-meta{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:22px}
.sh-loc{
  display:flex;align-items:center;gap:8px;
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:10px 14px;margin-bottom:18px;font-size:13px;
}

/* ── BUTTONS ── */
.btn{
  width:100%;padding:15px;border-radius:15px;border:none;
  font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.2px;
}
.btn+.btn{margin-top:9px}
.btn-gold{background:linear-gradient(135deg,#C9A84C,#E4C97A);color:#0B0B14}
.btn-gold:active{transform:scale(.97);opacity:.9}
.btn-red{background:rgba(217,96,96,.13);color:var(--red);border:1px solid rgba(217,96,96,.22)}
.btn-ghost{background:var(--card);color:var(--text);border:1px solid var(--border)}
.btn:disabled{opacity:.4;cursor:default}

/* ── TOAST ── */
.toast{
  position:fixed;top:16px;left:50%;
  transform:translateX(-50%) translateY(-120px);
  background:rgba(20,20,31,.96);border:1px solid var(--border);
  color:var(--text);padding:11px 20px;border-radius:100px;
  font-size:13px;font-weight:500;z-index:300;
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  white-space:nowrap;backdrop-filter:blur(20px);pointer-events:none;
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ── LOADER ── */
.loader{display:flex;align-items:center;justify-content:center;padding:44px}
.spin{
  width:28px;height:28px;border:2px solid var(--border);
  border-top-color:var(--gold);border-radius:50%;animation:rot .7s linear infinite;
}
@keyframes rot{to{transform:rotate(360deg)}}

/* ── EMPTY ── */
.empty{text-align:center;padding:44px 24px;color:var(--muted)}
.empty .ico{font-size:48px;margin-bottom:12px}
.empty p{font-size:14px;line-height:1.55}

/* ── DANCER SVG decoration ── */
.deco{position:absolute;pointer-events:none;opacity:.07}

/* ── Scan button ── */
.scan-btn{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.25);
  color:var(--gold);border-radius:12px;padding:8px 12px;
  cursor:pointer;font-size:11px;font-weight:600;letter-spacing:.3px;
  transition:all .2s;flex-shrink:0;
}
.scan-btn:active{transform:scale(.94);opacity:.8}
</style>
</head>
<body>
<div id="app">

  <!-- ═══ HOME ═══ -->
  <div class="screen active" id="sc-home">

    <div class="hero">
      <!-- Dancer silhouette -->
      <svg class="hero-dancer" viewBox="0 0 100 120" fill="var(--gold-lt)" xmlns="http://www.w3.org/2000/svg">
        <!-- Head -->
        <circle cx="62" cy="10" r="7"/>
        <!-- Body leaning back in arabesque -->
        <path d="M62 17 Q58 32 50 42 Q42 52 36 58" stroke="var(--gold-lt)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        <!-- Back leg up (arabesque) -->
        <path d="M50 42 Q60 36 75 28 Q85 22 90 18" stroke="var(--gold-lt)" stroke-width="3" fill="none" stroke-linecap="round"/>
        <!-- Standing leg -->
        <path d="M50 42 Q48 58 46 70 Q44 82 44 95" stroke="var(--gold-lt)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        <!-- Front arm -->
        <path d="M56 28 Q46 22 38 18 Q32 15 28 14" stroke="var(--gold-lt)" stroke-width="3" fill="none" stroke-linecap="round"/>
        <!-- Back arm flowing -->
        <path d="M58 30 Q66 38 70 48" stroke="var(--gold-lt)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <!-- Foot -->
        <path d="M44 95 Q42 99 40 100" stroke="var(--gold-lt)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      </svg>

      <div class="hero-sub">Добро пожаловать</div>
      <div class="hero-name">Привет, <em id="h-name">…</em></div>
      <div class="hero-row">
        <div class="hero-stat">
          <div class="hero-val" id="h-cls">—</div>
          <div class="hero-lbl">занятий осталось</div>
        </div>
        <div class="hero-stat" style="cursor:pointer" onclick="goTo('schedule')">
          <div class="hero-val" style="font-size:18px;padding-top:4px" id="h-next">—</div>
          <div class="hero-lbl">следующее занятие</div>
        </div>
      </div>
    </div>

    <div class="sec">Ближайшие занятия</div>
    <div id="h-list"><div class="loader"><div class="spin"></div></div></div>

  </div>

  <!-- ═══ SCHEDULE ═══ -->
  <div class="screen" id="sc-schedule">
    <div class="cal-hd">
      <div class="cal-title" id="cal-lbl">—</div>
      <div class="cal-btns">
        <div class="cal-btn" onclick="calMove(-1)">‹</div>
        <div class="cal-btn" onclick="calMove(1)">›</div>
      </div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="day-hd" id="day-hd"></div>
    <div id="day-list">
      <div class="empty"><div class="ico">📅</div><p>Выбери день в календаре</p></div>
    </div>
  </div>

  <!-- ═══ BOOKINGS ═══ -->
  <div class="screen" id="sc-bookings">
    <div class="bk-hd" style="display:flex;align-items:flex-start;justify-content:space-between">
      <div>
        <h2>Мои записи</h2>
        <p>Предстоящие занятия</p>
      </div>
      <button class="scan-btn" onclick="scanQR()" title="Отметить явку по QR">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M9.5 6.5v3h-3v-3h3M11 5H5v6h6V5zm-1.5 9.5v3h-3v-3h3M11 13H5v6h6v-6zm6.5-6.5v3h-3v-3h3M19 5h-6v6h6V5zm-6 8h1.5v1.5H13V13zm1.5 1.5H16V16h-1.5v-1.5zM16 13h1.5v1.5H16V13zm-3 3h1.5v1.5H13V16zm1.5 1.5H16V19h-1.5v-1.5zM16 16h1.5v1.5H16V16zm1.5-1.5H19V16h-1.5v-1.5zm0 3H19V19h-1.5v-1.5zM22 7h-2V4h-3V2h5v5zm0 15v-5h-2v3h-3v2h5zM2 22h5v-2H4v-3H2v5zM2 2v5h2V4h3V2H2z"/>
        </svg>
        <span>Отметиться</span>
      </button>
    </div>
    <div id="bk-list"><div class="loader"><div class="spin"></div></div></div>
  </div>

  <!-- ═══ SUBSCRIPTION ═══ -->
  <div class="screen" id="sc-sub">
    <div class="sub-hd">
      <h2>Абонемент</h2>
      <p>Управление и оплата</p>
    </div>
    <div id="sub-body"><div class="loader"><div class="spin"></div></div></div>
  </div>

  <!-- ═══ NAV ═══ -->
  <nav>
    <div class="ni on" onclick="goTo('home')" id="ni-home">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span>Главная</span>
    </div>
    <div class="ni" onclick="goTo('schedule')" id="ni-schedule">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/></svg>
      <span>Расписание</span>
    </div>
    <div class="ni" onclick="goTo('bookings')" id="ni-bookings">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm-2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
      <span>Мои записи</span>
    </div>
    <div class="ni" onclick="goTo('sub')" id="ni-sub">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg>
      <span>Абонемент</span>
    </div>
  </nav>
</div>

<!-- ═══ BOTTOM SHEET ═══ -->
<div class="overlay" id="sheet-wrap" onclick="sheetClose(event)">
  <div class="sheet" id="sheet">
    <div class="sh-handle"></div>
    <div class="sh-title" id="sh-title"></div>
    <div class="sh-meta"  id="sh-meta"></div>
    <div id="sh-acts"></div>
  </div>
</div>

<!-- ═══ TOAST ═══ -->
<div class="toast" id="toast"></div>

<script>
const tg  = window.Telegram?.WebApp;
const uid = tg?.initDataUnsafe?.user?.id || 0;
if (tg) { tg.ready(); tg.expand(); }

const MO  = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const MOS = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
const DS  = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
const DL  = ['Понедельник','Вторник','Среда','Четверг','Пятница','Суббота','Воскресенье'];

const now = new Date();
let cy = now.getFullYear(), cm = now.getMonth()+1;
let dots = new Set(), selDay = null, cur = 'home', sheetData = null;

/* ── API ── */
async function api(path, opts={}) {
  try {
    const r = await fetch('/miniapp/api'+path, {
      headers:{'X-User-Id':String(uid),'Content-Type':'application/json'},
      ...opts
    });
    if (!r.ok) throw new Error('HTTP '+r.status);
    return r.json();
  } catch(e) {
    console.error('API error', path, e);
    throw e;
  }
}

/* ── Navigation ── */
function goTo(name) {
  ['home','schedule','bookings','sub'].forEach(n => {
    document.getElementById('sc-'+n).classList.toggle('active', n===name);
    document.getElementById('ni-'+n).classList.toggle('on', n===name);
  });
  cur = name;
  if (name==='home')     loadHome();
  if (name==='schedule') loadCal();
  if (name==='bookings') loadBk();
  if (name==='sub')      loadSub();
}

/* ── Toast ── */
let _tt;
function toast(msg, err) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.color = err ? 'var(--red)' : 'var(--text)';
  el.classList.add('show');
  clearTimeout(_tt);
  _tt = setTimeout(()=>el.classList.remove('show'), 2600);
}

/* ── Sheet ── */
function sheetOpen(cls) {
  sheetData = cls;
  document.getElementById('sh-title').textContent = cls.title;
  document.getElementById('sh-meta').innerHTML =
    `📅 ${cls.date_str||cls.date} &nbsp;·&nbsp; 🕐 ${cls.time}<br>` +
    `👤 ${cls.trainer} &nbsp;·&nbsp; 📍 ${cls.location||'Студия'}`;
  let html = '';
  if (cls.is_booked) {
    html = `<button class="btn btn-red"   onclick="doCancel()">Отменить запись</button>`;
  } else if (cls.free_spots<=0) {
    html = `<button class="btn btn-ghost" disabled>Мест нет</button>`;
  } else {
    html = `<button class="btn btn-gold"  onclick="doBook()">Записаться</button>`;
  }
  document.getElementById('sh-acts').innerHTML = html;
  document.getElementById('sheet-wrap').classList.add('open');
}
function sheetClose(e) {
  if (e.target===e.currentTarget) document.getElementById('sheet-wrap').classList.remove('open');
}
function _sh() { document.getElementById('sheet-wrap').classList.remove('open'); }

async function doBook() {
  if (!sheetData) return; _sh();
  const r = await api('/book',{method:'POST',body:JSON.stringify({class_id:sheetData.id})});
  if (r.ok) { toast('✓ Ты записана!'); refresh(); }
  else toast(r.error||'Ошибка записи', true);
}
async function doCancel() {
  if (!sheetData) return; _sh();
  const bks = await api('/bookings');
  const bk  = bks.bookings?.find(b=>b.title===sheetData.title && b.time===sheetData.time);
  if (!bk) { toast('Запись не найдена', true); return; }
  const r = await api('/cancel',{method:'POST',body:JSON.stringify({booking_id:bk.booking_id})});
  if (r.ok) { toast('Запись отменена'); refresh(); }
  else toast('Ошибка', true);
}
function refresh() {
  if (cur==='home')     loadHome();
  if (cur==='schedule' && selDay) loadDay(selDay);
  if (cur==='bookings') loadBk();
  if (cur==='sub')      loadSub();
}

/* ── HOME ── */
async function loadHome() {
  const el = document.getElementById('h-list');
  try {
    const d = await api('/home');
    document.getElementById('h-name').textContent = d.name?.split(' ')[0]||'Гость';
    document.getElementById('h-cls').textContent  = d.classes_left??'—';
    const nxt = document.getElementById('h-next');
    if (d.next_class && d.next_class!=='—') {
      nxt.innerHTML = d.next_class+'<br><span style="font-size:12px;color:var(--muted);font-weight:500">'+(d.days_until||'')+'</span>';
    } else nxt.textContent='—';
    if (!d.upcoming?.length) {
      el.innerHTML='<div class="empty"><div class="ico">🌿</div><p>Нет ближайших занятий</p></div>';
      return;
    }
    el.innerHTML = d.upcoming.map(c=>ccHTML(c)).join('');
  } catch(e) {
    el.innerHTML='<div class="empty"><div class="ico">⚠️</div><p>Нет соединения с сервером</p></div>';
  }
}

/* ── CALENDAR ── */
function fmtDate(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}` }
function pad(n){ return String(n).padStart(2,'0') }

async function loadCal() {
  document.getElementById('cal-lbl').textContent = `${MO[cm-1]} ${cy}`;
  renderGrid();
  try {
    const d = await api(`/schedule?year=${cy}&month=${cm}`);
    dots = new Set((d.classes||[]).map(c=>c.date));
    renderGrid();
    const ts = fmtDate(now);
    if (cy===now.getFullYear() && cm===now.getMonth()+1 && dots.has(ts)) selDay=ts, renderGrid(), loadDay(ts);
  } catch(e) {
    // dots remain empty, calendar still usable
  }
}
function renderGrid() {
  const fd = (new Date(cy,cm-1,1).getDay()+6)%7;
  const nd = new Date(cy,cm,0).getDate();
  const td = fmtDate(now);
  let h = DS.map(d=>`<div class="cal-dn">${d}</div>`).join('');
  for(let i=0;i<fd;i++) h+=`<div class="cal-d empty"></div>`;
  for(let d=1;d<=nd;d++){
    const ds=`${cy}-${pad(cm)}-${pad(d)}`;
    const past=ds<td, today=ds===td, sel=ds===selDay, dot=dots.has(ds);
    let c='cal-d';
    if(past)  c+=' past';
    if(today) c+=' today';
    if(sel)   c+=' sel';
    if(dot)   c+=' dot';
    const cl=!past?`onclick="pick('${ds}')"` :'';
    h+=`<div class="${c}" ${cl}>${d}</div>`;
  }
  // Pad to always fill 6 complete rows (42 cells) — keeps calendar height stable
  const filled = fd + nd;
  const target = Math.max(42, Math.ceil(filled/7)*7);
  for(let i=filled;i<target;i++) h+=`<div class="cal-d empty"></div>`;
  document.getElementById('cal-grid').innerHTML = h;
}
async function pick(ds) {
  selDay=ds; renderGrid(); await loadDay(ds);
}
async function loadDay(ds) {
  const [y,m,d] = ds.split('-').map(Number);
  const dow = (new Date(y,m-1,d).getDay()+6)%7;
  document.getElementById('day-hd').innerHTML = `<b>${DL[dow]}, ${d} ${MOS[m-1]}</b>`;
  const el = document.getElementById('day-list');
  el.innerHTML='<div class="loader"><div class="spin"></div></div>';
  try {
    const data = await api(`/schedule/day?date=${ds}`);
    if (!data.classes?.length) {
      el.innerHTML='<div class="empty"><div class="ico">🌿</div><p>В этот день занятий нет</p></div>';
      return;
    }
    el.innerHTML = data.classes.map(c=>{ c.date_str=`${d} ${MOS[m-1]}`; return ccHTML(c); }).join('');
  } catch(e) {
    el.innerHTML='<div class="empty"><div class="ico">⚠️</div><p>Не удалось загрузить занятия</p></div>';
  }
}
function calMove(dir) {
  cm+=dir;
  if(cm>12){cm=1;cy++}
  if(cm<1) {cm=12;cy--}
  selDay=null;
  document.getElementById('day-hd').innerHTML='';
  document.getElementById('day-list').innerHTML='<div class="empty"><div class="ico">📅</div><p>Выбери день в календаре</p></div>';
  document.getElementById('cal-lbl').textContent=`${MO[cm-1]} ${cy}`;
  dots=new Set(); renderGrid(); loadCal();
}

/* ── BOOKINGS ── */
async function loadBk() {
  const el = document.getElementById('bk-list');
  let d;
  try { d = await api('/bookings'); } catch(e) {
    el.innerHTML='<div class="empty"><div class="ico">⚠️</div><p>Нет соединения с сервером</p></div>';
    return;
  }
  if (!d.bookings?.length) {
    el.innerHTML='<div class="empty"><div class="ico">🗓</div><p>Нет предстоящих занятий.<br>Запишись через расписание!</p></div>';
    return;
  }
  el.innerHTML = d.bookings.map(b=>{
    const [,m,day]=b.date.split('-');
    return `<div class="bk-item">
      <div class="bk-date">
        <div class="bk-day">${parseInt(day)}</div>
        <div class="bk-mon">${MOS[parseInt(m)-1]}</div>
      </div>
      <div class="bk-info">
        <div class="bk-ttl">${b.title}</div>
        <div class="bk-sub">👤 ${b.trainer}</div>
        <div class="bk-time">🕐 ${b.time}</div>
      </div>
      <button class="del-btn" onclick="cancelBk(${b.booking_id})">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
        </svg>
      </button>
    </div>`;
  }).join('');
}
async function cancelBk(id) {
  const r = await api('/cancel',{method:'POST',body:JSON.stringify({booking_id:id})});
  if (r.ok) { toast('Запись отменена'); loadBk(); }
  else toast('Ошибка',true);
}

/* ── SUBSCRIPTION ── */
async function loadSub() {
  const el = document.getElementById('sub-body');
  let d;
  try { d = await api('/subscription'); } catch(e) {
    el.innerHTML='<div class="empty"><div class="ico">⚠️</div><p>Нет соединения с сервером</p></div>';
    return;
  }
  const pct = d.total ? Math.round(d.classes_left/d.total*100) : 0;
  let hero = '';

      <div class="sub-big">${d.classes_left}</div>
      <div class="sub-lbl">занятий осталось</div>
      <div class="prog-wrap"><div class="prog-fill" style="width:${pct}%"></div></div>
      <div class="prog-meta"><span>Использовано: ${d.used}</span><span>Всего: ${d.total}</span></div>
    </div>`;
  } else {
    hero = `<div class="sub-hero">
      <svg style="width:56px;height:56px;margin-bottom:12px;opacity:.6" viewBox="0 0 100 120" fill="var(--gold-lt)">
        <circle cx="62" cy="10" r="7"/>
        <path d="M62 17 Q58 32 50 42 Q42 52 36 58" stroke="var(--gold-lt)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        <path d="M50 42 Q60 36 75 28 Q85 22 90 18" stroke="var(--gold-lt)" stroke-width="3" fill="none" stroke-linecap="round"/>
        <path d="M50 42 Q48 58 46 70 Q44 82 44 95" stroke="var(--gold-lt)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        <path d="M56 28 Q46 22 38 18 Q32 15 28 14" stroke="var(--gold-lt)" stroke-width="3" fill="none" stroke-linecap="round"/>
      </svg>
      <div style="font-size:16px;font-weight:700;margin-bottom:6px">Абонемента нет</div>
      <div style="font-size:13px;color:var(--muted)">Выбери подходящий тариф</div>
    </div>`;
  }
  el.innerHTML = hero +
    `<div class="sec">Купить абонемент</div>
    <div class="plan" onclick="pay('four')">
      <div class="plan-l"><div class="plan-n">4 занятия</div><div class="plan-d">30 дней</div></div>
      <div class="plan-p">500 000 сум</div>
    </div>
    <div class="plan" onclick="pay('eight')">
      <div class="plan-l"><div class="plan-n">8 занятий</div><div class="plan-d">30 дней</div></div>
      <div class="plan-p">800 000 сум</div>
    </div>
    <div class="plan feat" onclick="pay('twelve')">
      <div class="plan-l"><div class="plan-n">12 занятий <span class="hot">🔥 ВЫГОДНО</span></div><div class="plan-d">30 дней</div></div>
      <div class="plan-p">1 100 000 сум</div>
    </div>
    <div class="plan" onclick="pay('sixteen')">
      <div class="plan-l"><div class="plan-n">16 занятий</div><div class="plan-d">30 дней</div></div>
      <div class="plan-p">1 400 000 сум</div>
    </div>`;
}
async function pay(plan) {
  const r = await api('/pay',{method:'POST',body:JSON.stringify({plan})});
  if (r.payment_url) {
    if (tg) tg.openLink(r.payment_url);
    else window.open(r.payment_url,'_blank');
  } else toast(r.error||'Ошибка оплаты', true);
}

/* ── Helpers ── */
function spotsB(c) {
  if (c.is_booked)     return `<span class="badge badge-yes">✓ Записана</span>`;
  if (c.free_spots<=0) return `<span class="badge badge-no">Нет мест</span>`;
  if (c.free_spots<=2) return `<span class="badge badge-few">${c.free_spots} место</span>`;
  return `<span class="badge badge-ok">${c.free_spots} мест</span>`;
}
function ccHTML(c) {
  const d = JSON.stringify(c).replace(/"/g,'&quot;');
  return `<div class="cc${c.is_booked?' booked':''}" onclick="sheetOpen(JSON.parse(this.dataset.c))" data-c="${d}">
    <div class="cc-time">${c.time}</div>
    <div class="cc-info">
      <div class="cc-title">${c.title}</div>
      <div class="cc-meta">👤 ${c.trainer} · 📍 ${c.location||'Студия'}</div>
    </div>
    ${spotsB(c)}
  </div>`;
}

/* ── QR Scanner ── */
function scanQR() {
  if (!tg?.showScanQrPopup) {
    toast('Обнови Telegram для использования сканера', true);
    return;
  }
  tg.showScanQrPopup({ text: 'Наведи камеру на QR-код учителя' }, async (raw) => {
    tg.closeScanQrPopup();
    // Ожидаем URL вида: https://.../miniapp/?attend=TOKEN
    // или просто токен напрямую
    let token = raw;
    try {
      const url = new URL(raw);
      token = url.searchParams.get('attend') || raw;
    } catch (_) {}
    await submitAttend(token);
    return true; // закрыть popup
  });
}

async function submitAttend(token) {
  if (!token) return;
  const r = await api('/attend', { method: 'POST', body: JSON.stringify({ token }) });
  if (r.ok) {
    toast(r.already ? '✓ Ты уже отмечена' : '✅ Явка отмечена!');
    loadBk();
  } else {
    toast(r.error || 'Ошибка', true);
  }
}

/* ── Auto-attend from URL param ── */
(function checkAttendParam() {
  const params = new URLSearchParams(window.location.search);
  const token  = params.get('attend');
  if (token) {
    // Убираем параметр из URL без перезагрузки
    const clean = window.location.pathname;
    history.replaceState({}, '', clean);
    // Небольшая задержка чтобы приложение успело инициализироваться
    setTimeout(() => submitAttend(token), 600);
  }
})();

/* ── Init ── */
loadHome();
