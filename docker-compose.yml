
services:

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: pilates_db
      POSTGRES_USER: pilates
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-strongpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pilates"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  bot:
    build: .
    restart: always
    env_file: .env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      DATABASE_URL: postgresql+asyncpg://pilates:${POSTGRES_PASSWORD:-strongpassword}@postgres:5432/pilates_db
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python main.py

  webhook:
    build: .
    restart: always
    env_file: .env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      DATABASE_URL: postgresql+asyncpg://pilates:${POSTGRES_PASSWORD:-strongpassword}@postgres:5432/pilates_db
    ports:
      - "8080:8080"   # FastAPI miniapp API
      - "8081:8081"   # Payme JSON-RPC webhook
    depends_on:
      postgres:
        condition: service_healthy
    command: python webhook_runner.py

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./miniapp:/opt/pilates-bot/miniapp:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/log/nginx:/var/log/nginx  # fail2ban читает логи с хоста
    depends_on:
      - webhook

volumes:
  postgres_data:
  redis_data:
