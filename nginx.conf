server {
    listen 80;
    server_name pilates.yourdomain.ru;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name pilates.yourdomain.ru;

    ssl_certificate     /etc/letsencrypt/live/pilates.yourdomain.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pilates.yourdomain.ru/privkey.pem;

    # Только webhook ЮKassa — проксируем на aiohttp
    location /yukassa/webhook {
        proxy_pass         http://webhook:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }
}
