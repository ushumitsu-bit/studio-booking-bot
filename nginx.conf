# Rate limiting zones (shared memory, 10MB each)
limit_req_zone $binary_remote_addr zone=api:10m      rate=10r/s;
limit_req_zone $binary_remote_addr zone=webhook:10m  rate=5r/s;
limit_req_zone $binary_remote_addr zone=general:10m  rate=30r/s;

# Block common scanner user-agents
map $http_user_agent $bad_bot {
    default         0;
    ~*masscan        1;
    ~*zgrab          1;
    ~*nikto          1;
    ~*sqlmap         1;
    ~*nmap           1;
    ~*python-requests 0;  # разрешаем — Payme использует
}

server {
    listen 80;
    server_name pilates.fapass.xyz;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name pilates.fapass.xyz;

    ssl_certificate     /etc/letsencrypt/live/pilates.fapass.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pilates.fapass.xyz/privkey.pem;

    # Docker internal DNS — позволяет nginx стартовать до upstream
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Блокируем известных сканеров
    if ($bad_bot) { return 444; }

    location /miniapp/api/ {
        limit_req zone=api burst=30 nodelay;
        limit_req_status 429;

        set $up_webhook webhook;
        proxy_pass         http://$up_webhook:8080/miniapp/api/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    location /miniapp/ {
        limit_req zone=general burst=50 nodelay;

        alias /opt/pilates-bot/miniapp/;
        try_files $uri $uri/ /miniapp/index.html;
        add_header Cache-Control "no-cache";
        add_header X-Frame-Options "ALLOWALL";
        add_header Content-Security-Policy "frame-ancestors *";
    }

    location /payme/webhook {
        limit_req zone=webhook burst=10 nodelay;
        limit_req_status 429;

        # Только Payme IP (опционально раскомментировать после проверки)
        # allow 185.8.212.0/24;
        # deny all;

        set $up_payme webhook;
        proxy_pass         http://$up_payme:8081/payme/webhook;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # Всё остальное — 444 (silent drop, не тратим трафик на ответ)
    location / {
        limit_req zone=general burst=20 nodelay;
        return 444;
    }
}
