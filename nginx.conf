server {
    listen 80;
    server_name pilates.fapass.xyz;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name pilates.fapass.xyz;

    ssl_certificate     /etc/letsencrypt/live/pilates.fapass.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pilates.fapass.xyz/privkey.pem;

    location /miniapp/api/ {
        proxy_pass         http://webhook:8080/miniapp/api/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    location /miniapp/ {
        alias /opt/pilates-bot/miniapp/;
        try_files $uri $uri/ /miniapp/index.html;
        add_header Cache-Control "no-cache";
    }

    location /yukassa/webhook {
        proxy_pass         http://webhook:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }
}
